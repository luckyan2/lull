<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小镇</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #d0cabe;
        min-height: 100vh;
        padding: 15px 0;
      }
      /* 顶部标题 xx小镇，缩小和下方容器的间距 */
      .page-title {
        text-align: center;
        font-size: 24px;
        margin-bottom: 6px; /* 原15px缩小为6px，上下间距大幅收紧 */
        color: #222;
      }
      /* 外层米白大容器 */
      .container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
        background-color: #efece3;
        border: 1px solid #000000;
        padding: 12px 20px 20px 20px; /* 顶部内边距从20px改为12px，减少头部到头像栏距离 */
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      /* 顶部头像+设置栏，上下留白减少 */
      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 2px 0;
      }
      .setting-box {
        background: #e6decb;
        border: 1px solid transparent;
        padding: 3px 10px;
        font-size: 18px;
        color: #000000;
        cursor: pointer;
      }
      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #ececec;
        border: 1px solid #000000;
        object-fit: cover;
      }
      /* 横版2:1视频容器，宽:高=2:1 */
      .video-wrap {
        width: 100%;
        position: relative;
        padding-top: 50%;
        overflow: hidden;
        border: 1px solid #000000;
        border-radius: 5px;
      }
      .video-placeholder {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      /* 底部意见箱+网址（容器外部，宽度对齐容器） */
      .bottom-row {
        width: 90%;
        max-width: 1200px;
        margin: 12px auto 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
      .feedback-box {
        font-size: 12px;
        color: #000;
        cursor: pointer;
      }
      .divider {
        font-size: 12px;
        color: #000;
      }
      .footer-link {
        font-size: 12px;
        color: #7d776b;
      }
    </style>
  </head>
  <body>
    <!-- 容器上方标题 -->
    <h2 class="page-title">xx小镇</h2>

    <div class="container">
      <!-- 顶部头像+设置 -->
      <div class="top-bar">
        <img
          class="avatar"
          src="https://preview.qiantucdn.com/freepik/512/4534/4534033.png!w1024_new_small_1"
          alt="头像"
        />
        <div class="setting-box">设置</div>
      </div>
      <!-- 2:1横向宽屏视频区域 -->
      <div class="video-wrap">
        <img
          class="video-placeholder"
          src="https://ts3.tc.mm.bing.net/th/id/OIP-C.V7VQxOtgNNOXzYkx-XhxNgHaJF?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
          alt="视频占位图"
        />
      </div>
    </div>

    <!-- 容器外部底部行 -->
    <div class="bottom-row">
      <div class="feedback-box">意见箱</div>
      <span class="divider">|</span>
      <a class="footer-link" href="放链接">网址</a>
    </div>
  </body>
</html>
