<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <title>小镇</title>
    <style>
      /* =========================================================
               🏠 1. 全局重置 & 基础样式
               ========================================================= */
      /*【* 全局通配符：所有元素默认内外边距、盒模型统一】 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      /*【body 页面整体背景、基础字体、最小高度】 */
      body {
        background: #d0cabe;
        min-height: 100vh;
        padding: 15px 0;
        font-family: system-ui, sans-serif;
      }
      /*【.wrap-width 宽度自适应容器：顶部文字、标题、用户头像外层容器】 */
      .wrap-width {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
      }

      /* =========================================================
               📌 2. 顶部栏：留言 & 设置
               ========================================================= */
      /*【.top-bar-msg-set 页面最顶部一行：左侧给我留言、右侧设置】 */
      .top-bar-msg-set {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: clamp(13px, 1.8vw, 16px);
        color: #000;
        margin-bottom: 15px;
      }
      /*【.msg-left 顶部左侧文字：给我留言】 */
      .msg-left {
        cursor: pointer;
      }
      /*【.set-right 顶部右侧文字：设置】 */
      .set-right {
        cursor: pointer;
      }

      /* =========================================================
               📍 3. 地址文字
               ========================================================= */
      /*【.text-address 标题上方居中小字：地址】 */
      .text-address {
        text-align: center;
        font-size: clamp(11px, 1.5vw, 13px);
        color: #000;
        margin-bottom: 2px;
        white-space: nowrap;
      }

      /* =========================================================
               🏷️ 4. 主标题 & 宽度打字动画
               ========================================================= */
      /*【.town-title 页面大标题：品尝红烧牛肉面，自带宽度打字动画】 */
      .town-title {
        text-align: center;
        font-size: clamp(28px, 6vw, 80px);
        font-weight: 700;
        margin-bottom: 4px;
        color: #000;
        white-space: nowrap;
        overflow: hidden;
        animation: widthTyping 2.5s steps(12, end) forwards;
        width: 0;
        margin-left: auto;
        margin-right: auto;
      }
      /*【@keyframes widthTyping 标题专用打字关键帧动画】 */
      @keyframes widthTyping {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      /* =========================================================
               👤 5. 用户头像 & 名称
               ========================================================= */
      /*【.user-line 头像+用户名整行容器】 */
      .user-line {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: clamp(6px, 1vw, 10px);
        margin-bottom: 24px;
      }
      /*【.avatar 圆形用户头像图片】 */
      .avatar {
        width: clamp(20px, 4vw, 36px);
        height: clamp(20px, 4vw, 36px);
        border-radius: 50%;
        background: #fff;
        border: 1px solid #000;
        object-fit: cover;
      }
      /*【.username-text 头像右侧文字：用户名，自带底部黑线】 */
      .username-text {
        font-size: clamp(10px, 2vw, 16px);
        color: #000;
        white-space: nowrap;
        border-bottom: 1px solid #000;
        padding-bottom: 2px;
      }

      /* =========================================================
               🖼️ 6. 主容器 & 视频遮罩层
               ========================================================= */
      /*【.container 弹窗外层大容器，米色边框底色】 */
      .container {
        width: 95%;
        max-width: 1200px;
        margin: 0 auto;
        background-color: #efece3;
        border: 1px solid #000000;
        padding: clamp(12px, 3vw, 30px);
      }
      /*【.video-wrap 视频比例容器，控制弹窗整体宽高比例】 */
      .video-wrap {
        width: 100%;
        position: relative;
        padding-top: 40%;
        overflow: hidden;
        border: 1px solid #000;
      }
      /*【.video-placeholder 底层静态背景大图】 */
      .video-placeholder {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      /*【.video-mask 黑色半透明遮罩，承载弹窗三层页面】 */
      .video-mask {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        padding: 4px;
      }
      /*【.mask-inner 弹窗内层内容容器，承载page0/page1/page2】 */
      .mask-inner {
        width: 90%;
        height: 90%;
        background-image: url("https://i.imgs.ovh/2026/07/06/da17431044c46293bc8dc1c12f8bf1b5.png");
        background-size: cover;
        background-position: center;
        border: 1px solid #00000000;
        padding: clamp(10px, 2vw, 24px);
        color: #000;
        overflow: hidden;
        position: relative;
      }

      /* =========================================================
               📄 7. 弹窗内部三页面容器 (page0/1/2)
               ========================================================= */
      /*【.page0 弹窗封面页、.page1第一内容页、.page2第二邀请页 公共基础样式】 */
      .page0,
      .page1,
      .page2 {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        padding: clamp(10px, 2vw, 24px);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      /*【.page0 弹窗初始封面全屏图片层，最上层】 */
      .page0 {
        display: flex;
        z-index: 20;
        background-image: url("https://i.imgs.ovh/2026/07/08/5e66c2baa8c9f9f9a44d4837d418c1b3.jpg");
        background-size: cover;
        background-position: center;
        justify-content: flex-end;
        padding-bottom: clamp(20px, 5vw, 50px);
      }
      /*【.page1 打开封面后第一页：欢迎文字+四张图片+下一页按钮】 */
      .page1 {
        display: none;
        z-index: 10;
        justify-content: space-between;
        padding-top: clamp(6px, 4vw, 29px);
        padding-bottom: 4px;
      }
      /*【.page2 点击下一页后第二页：邀请文字+接受按钮】 */
      .page2 {
        display: none;
        z-index: 10;
        justify-content: center;
        gap: clamp(8px, 1.5vw, 14px);
      }

      /*【.show-page1 给mask-inner添加该类，隐藏封面显示page1】 */
      .show-page1 .page0 {
        display: none;
      }
      .show-page1 .page1 {
        display: flex;
      }
      /*【.show-page2 给mask-inner添加该类，隐藏封面/page1，显示page2】 */
      .show-page2 .page0 {
        display: none;
      }
      .show-page2 .page1 {
        display: none;
      }
      .show-page2 .page2 {
        display: flex;
      }

      /* =========================================================
               🎬 8. 页面0：封面图片 + “打开”按钮
               ========================================================= */
      /*【.page0-btn 封面底部【打开】按钮，独立样式，不继承btn-base】
        修改封面按钮尺寸、字体必须改这里，修改.btn-base对此按钮无效
      */
      .page0-btn {
        padding: clamp(1px, 1vw, 8px) clamp(5px, 5vw, 35px);
        border: 1px solid #000;
        background: #efece3;
        cursor: pointer;
        font-size: clamp(3px, 4vw, 35px);
        transition: 0.2s;
      }
      .page0-btn:hover {
        background: #d9d1be;
      }

      /* =========================================================
               💬 9. 页面1：顶部欢迎文字 (两行)
               ========================================================= */
      /*【.top-welcome page1顶部两行欢迎文字外层容器】 */
      .top-welcome {
        width: 100%;
        text-align: center;
        margin-bottom: clamp(1px, 2vw, 3px);
      }
      /*【.top-welcome .type-line 仅欢迎两行文字的字号行高，单独覆盖全局type-line】 */
      .top-welcome .type-line {
        font-size: clamp(3px, 1.5vw, 20px);
        line-height: 1.6;
        margin: 0 auto;
        text-align: center;
      }

      /* =========================================================
               🖼️ 10. 页面1：四张图片 (宽度按比例分配)
               ========================================================= */

      /* ---- 10-A. 父容器：控制四张图片的整体布局 ---- */
      /*【.box-row 四张图片横向排列父容器】 */
      .box-row {
        width: 90%;
        display: flex;
        justify-content: center;
        align-items: stretch;
        gap: clamp(4px, 1.2vw, 12px);
        padding: 0 clamp(2px, 1vw, 10px);
        margin-bottom: clamp(0px, 2vw, 15px);
      }

      /* ---- 10-B. 单张图片基础样式：不再设固定宽度，用 flex 比例控制 ---- */
      /*【.flat-box 四张图片统一基础容器样式】 */
      .flat-box {
        flex: 1 1 0;
        height: clamp(80px, 10vw, 130px);
        border: 1px solid #00000000;
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        padding: clamp(4px, 1vw, 10px);
        padding-top: clamp(5px, 3vw, 15px);
        gap: 1px;
        visibility: hidden;
        animation-fill-mode: forwards;
        overflow: hidden;
      }

      /* ---- 10-C. 四张图片各自的 flex-grow 比例 ---- */
      /*【.box-1 第一张图、.box-3第三张图 宽图比例】 */
      .box-1,
      .box-3 {
        flex-grow: 3;
      }
      /*【.box-2 第二张图、.box-4第四张图 窄图比例】 */
      .box-2,
      .box-4 {
        flex-grow: 1;
      }

      /* ---- 10-D. 各自背景图（可替换） ---- */
      /*【.box-1 第一张背景图+显示动画】 */
      .box-1 {
        background-image: url("https://n.sinaimg.cn/sinakd20118/214/w2048h1366/20241101/8af6-f2c42e2356f4c886b889c8a0ee4a17c4.jpg");
        animation: instantShow 0s linear 3.4s forwards;
      }
      /*【.box-2 第二张背景图+显示动画】 */
      .box-2 {
        background-image: url("https://pic.616pic.com/ys_bnew_img/00/64/95/G9REB94D6m.jpg");
        animation: instantShow 0s linear 3.4s forwards;
      }
      /*【.box-3 第三张背景图+显示动画】 */
      .box-3 {
        background-image: url("https://n.sinaimg.cn/sinakd20118/214/w2048h1366/20241101/8af6-f2c42e2356f4c886b889c8a0ee4a17c4.jpg");
        animation: instantShow 0s linear 14.2s forwards;
      }
      /*【.box-4 第四张背景图+显示动画】 */
      .box-4 {
        background-image: url("https://pic.616pic.com/ys_bnew_img/00/64/95/G9REB94D6m.jpg");
        animation: instantShow 0s linear 14.2s forwards;
      }

      /*【@keyframes instantShow 无渐变瞬间显示动画，图片、按钮共用】 */
      @keyframes instantShow {
        from {
          visibility: hidden;
        }
        to {
          visibility: visible;
        }
      }

      /* ---- 10-E. 方框内文字样式 ---- */
      /*【.flat-box .type-line 四张图内部人物介绍文字，单独覆盖全局type-line字号】 */
      .flat-box .type-line {
        font-size: clamp(7px, 1.4vw, 13px);
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
        animation-fill-mode: forwards;
      }

      /* =========================================================
               ⌨️ 11. 打字动画 (所有逐字出现文字)
               ========================================================= */
      /*【.type-line 全局所有打字文字基础样式（欢迎、人物、邀请文字通用）】 */
      .type-line {
        font-size: clamp(7px, 1.4vw, 29px);
        line-height: 1.5;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
        animation-fill-mode: forwards;
      }
      /*【@keyframes typing 文字逐字展开打字动画】 */
      @keyframes typing {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      /* ---- 顶部欢迎文字 ---- */
      /*【.line1 第一行欢迎文字：欢迎来到无风镇。】 */
      .line1 {
        animation: typing 3.5s steps(12, end) 0.5s forwards;
      }
      /*【.line4 第二行欢迎文字：愿你在小镇上度过愉快的一天。】 */
      .line4 {
        animation: typing 3.5s steps(14, end) 1.7s forwards;
      }

      /* ---- 第一张图片：斯隆的文字 ---- */
      /*【.sl1 .sl2 .sl3 镇长斯隆三行介绍文字】 */
      .sl1 {
        animation: typing 1.8s steps(14, end) 11.4s forwards;
      }
      .sl2 {
        animation: typing 1.8s steps(12, end) 12.2s forwards;
      }
      .sl3 {
        animation: typing 1.4s steps(8, end) 13.2s forwards;
      }

      /* ---- 第三张图片：麦克的文字 ---- */
      /*【.mk1 .mk2 .mk3 副镇长麦克三行介绍文字】 */
      .mk1 {
        animation: typing 1.6s steps(12, end) 19.5s forwards;
      }
      .mk2 {
        animation: typing 1.8s steps(18, end) 20.4s forwards;
      }
      .mk3 {
        animation: typing 1.4s steps(9, end) 22.2s forwards;
      }

      /* =========================================================
               📨 12. 页面2：邀请文字
               ========================================================= */
      /*【.invite-line page2中间邀请整行文字】 */
      .invite-line {
        animation: typing 4s steps(26, end) 1.2s forwards;
        text-align: center;
        margin: 0 auto;
      }
      /*【.underline-w 邀请文字里字母w，棕色下划线】 */
      .underline-w {
        border-bottom: 2px solid #704828;
      }

      /* =========================================================
               🔘 13. 通用按钮 & 特定按钮 (下一页/接受邀请)clamp1是长，clamp2是宽
               ========================================================= */
      /*【.btn-base 通用按钮基础样式：#nextPageBtn #acceptBtn 共用类】
        修改下一页、接受按钮尺寸改这里，但ID权重更高，建议配合!important或写在ID下方
      */
      .btn-base {
        padding: clamp(1px, 1vw, 7px) clamp(5px, 3vw, 25px);
        border: 1px solid #000;
        background: #efece3;
        cursor: pointer;
        font-size: clamp(3px, 3vw, 20px);
        transition: 0.2s;
      }
      .btn-base:hover {
        background: #d9d1be;
      }

      /*【#nextPageBtn page1底部【下一页】按钮 ID选择器，权重高于.btn-base】 */
      #nextPageBtn {
        align-self: center;
        margin-top: 0;
        visibility: hidden;
        animation: instantShow 0s linear 25s forwards;
        margin-bottom: clamp(1px, 2vw, 26px);
        /* 如需单独修改此按钮尺寸，取消下面注释直接修改clamp */
        /* padding: clamp(3px, 1vw, 25px) clamp(9px, 3vw, 35px);
        font-size: clamp(8px, 1.2vw, 29px); */
      }
      /*【#acceptBtn page2底部【接受邀请】按钮 ID选择器，权重高于.btn-base】 */
      #acceptBtn {
        visibility: hidden;
        animation: instantShow 0s linear 3.4s forwards;
        /* 如需单独修改此按钮尺寸，取消下面注释直接修改clamp */
        /* padding: clamp(3px, 1vw, 25px) clamp(9px, 3vw, 35px);
        font-size: clamp(8px, 1.2vw, 29px); */
      }

      /* =========================================================
               🚫 14. 关闭弹窗
               ========================================================= */
      /*【.mask-hide 给video-mask添加后，整个弹窗直接隐藏】 */
      .mask-hide {
        display: none !important;
      }

      /* =========================================================
               🔗 15. 底部链接栏
               ========================================================= */
      /*【.bottom-link-row 页面最底部一行文字链接容器】 */
      .bottom-link-row {
        width: 90%;
        max-width: 1200px;
        margin: 20px auto 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        font-size: 12px;
      }
      /*【.feedback-box 底部文字：小镇手册】 */
      .feedback-box {
        color: #000;
        cursor: pointer;
      }
      /*【.divider-line 底部分隔竖线 |】 */
      .divider-line {
        color: #000;
      }
      /*【.footer-link 底部跳转链接：如何入住无风镇】 */
      .footer-link {
        color: #7d776b;
        text-decoration: none;
      }

      /* =========================================================
               📱 16. 移动端适配 (小屏幕微调)
               ========================================================= */
      @media (max-width: 480px) {
        .mask-inner {
          padding: 6px;
        }
        .page0,
        .page1,
        .page2 {
          padding: 6px;
        }

        .box-row {
          flex-wrap: nowrap;
          gap: 3px;
          padding: 0 2px;
          overflow: visible;
        }

        .flat-box {
          padding-top: clamp(15px, 2vw, 25px);
          height: clamp(35px, 4.5vw, 55px);
          padding: 3px 4px;
          flex-shrink: 1;
        }

        .box-1,
        .box-3 {
          flex-grow: 3;
        }
        .box-2,
        .box-4 {
          flex-grow: 1;
        }

        /*【移动端：方框内人物文字单独缩小】 */
        .flat-box .type-line {
          font-size: clamp(4px, 1vw, 8px);
          line-height: 1.2;
        }
        /*【移动端：顶部欢迎两行文字单独缩小】 */
        .top-welcome .type-line {
          font-size: clamp(6px, 1.2vw, 10px);
        }
      }

      /* 平板等中等屏幕优化 */
      @media (min-width: 481px) and (max-width: 768px) {
        .flat-box {
          height: clamp(70px, 9vw, 110px);
        }
        /*【平板：方框内人物文字字号】 */
        .flat-box .type-line {
          font-size: clamp(6px, 1.2vw, 10px);
        }
      }

      /* =========================================================
               🧩 17. 新增：后续流程步骤容器样式 (绝对定位，覆盖占位图)
               ========================================================= */
      /*【.step 每个步骤容器，默认隐藏，激活时显示】 */
      .step {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        z-index: 5; /* 低于弹窗(z-index:10)但高于占位图 */
        background-size: cover;
        background-position: center;
        overflow: hidden;
      }
      .step.active {
        display: block;
      }

      /*【步骤内的视频自适应】 */
      .step video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /*【步骤内的图片容器（背景图）】 */
      .step-img {
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        position: relative;
      }

      /* --- 按钮尺寸体系（比弹窗按钮略小） --- */
      /*【.main-btn 主按钮（A/B/C/D/E/F/G）】 */
      .main-btn {
        position: absolute;
        padding: 0.25em 0.9em;
        font-size: clamp(10px, 1.2vw, 16px);
        border: 1px solid #000;
        background: #efece3;
        cursor: pointer;
        transition: 0.2s;
        white-space: nowrap;
        z-index: 2;
      }
      .main-btn:hover {
        background: #d9d1be;
      }

      /*【.back-btn 返回按钮（颜色不同）】 */
      .back-btn {
        background: #c0b09a;
      }
      .back-btn:hover {
        background: #a6927a;
      }

      /*【.tag-btn 标签按钮（更小）】 */
      .tag-btn {
        position: absolute;
        padding: 0.1em 0.5em;
        font-size: clamp(7px, 0.8vw, 11px);
        border: 1px solid #000;
        background: #d4cbb8;
        cursor: pointer;
        transition: 0.2s;
        white-space: nowrap;
        z-index: 2;
      }
      .tag-btn:hover {
        background: #bfb49d;
      }

      /*【标签弹窗模态框：仅覆盖 .video-wrap 内部，不覆盖整个网页】 */
      #tagModal {
        position: absolute; /* 相对于 .video-wrap 定位 */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 30; /* 高于步骤容器 */
        border-radius: inherit; /* 继承父容器圆角（如有） */
      }

  <body>

        <!-- =========================================================

        <!-- 步骤1：视频A -->

            class="main-btn"

            style="
              bottom: 10%;

              transform: translateX(-50%);
              display: none;
            "
          >
            按钮B
          </button>
        </div>

        <!-- 步骤2：视频B -->
        <div class="step" id="step2">
          <video
            id="videoB"
            src="https://www.w3schools.com/html/mov_bbb.mp4"
            muted
          ></video>
          <!-- 按钮C：视频B结束后显示 -->
          <button
            class="main-btn"
            id="btnC"
            style="
              bottom: 10%;

              transform: translateX(-50%);
              display: none;
            "
          >
            按钮C
          </button>
        </div>

        <!-- 步骤3：图片C（含3个按钮：2个标签 + 1个主按钮D） -->
        <div class="step" id="step3">
          <div
            class="step-img"
            style="
              background-image: url(&quot;https://picsum.photos/seed/picC/800/400&quot;);
            "
          >
            <!-- 标签按钮1 -->
            <button class="tag-btn" data-tag="tag1" style="top: 20%; left: 10%">
              标签1
            </button>
            <!-- 标签按钮2 -->
            <button class="tag-btn" data-tag="tag2" style="top: 40%; left: 20%">
              标签2

            <!-- 按钮D -->
            <button class="main-btn" id="btnD" style="bottom: 15%; right: 15%">
              按钮D
            </button>
          </div>
        </div>

        <!-- 步骤4：图片D（含7个按钮：1个返回 + 3个标签 + 3个主按钮E/F/G） -->
        <div class="step" id="step4">
          <div

              background-image: url(&quot;https://picsum.photos/seed/picD/800/400&quot;);
            "
          >
            <!-- 返回按钮 -->
            <button
              class="main-btn back-btn"
              id="backToC"
              style="top: 5%; left: 5%"
            >
              返回
            </button>
            <!-- 三个标签 -->
            <button class="tag-btn" data-tag="tag3" style="top: 20%; left: 15%">
              标签3
            </button>
            <button class="tag-btn" data-tag="tag4" style="top: 20%; left: 35%">
              标签4
            </button>
            <button class="tag-btn" data-tag="tag5" style="top: 20%; left: 55%">
              标签5
            </button>
            <!-- 主按钮 E/F/G -->
            <button class="main-btn" id="btnE" style="bottom: 20%; left: 10%">
              按钮E
            </button>
            <button class="main-btn" id="btnF" style="bottom: 20%; left: 45%">
              按钮F
            </button>
            <button class="main-btn" id="btnG" style="bottom: 20%; right: 10%">
              按钮G
            </button>
          </div>
        </div>

        <!-- 步骤5：图片E（含3个按钮：2个标签 + 1个返回） -->
        <div class="step" id="step5">
          <div
            class="step-img"
            style="
              background-image: url(&quot;https://picsum.photos/seed/picE/800/400&quot;);
            "
          >
            <button
              class="main-btn back-btn"
              id="backToD1"
              style="top: 5%; left: 5%"
            >
              返回
            </button>
            <button class="tag-btn" data-tag="tag6" style="top: 30%; left: 20%">
              标签6
            </button>
            <button class="tag-btn" data-tag="tag7" style="top: 50%; left: 40%">
              标签7
            </button>
          </div>
        </div>

        <!-- 步骤6：图片F（含4个按钮：3个标签 + 1个返回） -->
        <div class="step" id="step6">
          <div
            class="step-img"
            style="
              background-image: url(&quot;https://picsum.photos/seed/picF/800/400&quot;);
            "
          >
            <button
              class="main-btn back-btn"
              id="backToD2"
              style="top: 5%; left: 5%"
            >
              返回
            </button>
            <button class="tag-btn" data-tag="tag8" style="top: 20%; left: 10%">
              标签8
            </button>
            <button class="tag-btn" data-tag="tag9" style="top: 40%; left: 25%">
              标签9
            </button>
            <button
              class="tag-btn"
              data-tag="tag10"
              style="top: 60%; left: 50%"
            >
              标签10
            </button>
          </div>
        </div>

        <!-- 步骤7：图片G（含5个按钮：4个标签 + 1个返回） -->
        <div class="step" id="step7">
          <div
            class="step-img"
            style="
              background-image: url(&quot;https://picsum.photos/seed/picG/800/400&quot;);
            "
          >
            <button
              class="main-btn back-btn"
              id="backToD3"
              style="top: 5%; left: 5%"
            >
              返回
            </button>
            <button
              class="tag-btn"
              data-tag="tag11"
              style="top: 15%; left: 10%"
            >
              标签11
            </button>
            <button
              class="tag-btn"
              data-tag="tag12"
              style="top: 30%; left: 30%"
            >
              标签12
            </button>
            <button
              class="tag-btn"
              data-tag="tag13"
              style="top: 50%; left: 50%"
            >
              标签13
            </button>
            <button
              class="tag-btn"
              data-tag="tag14"
              style="top: 70%; left: 70%"
            >
              标签14
            </button>
          </div>
        </div>

        <!-- ===== 标签弹窗模态框（仅覆盖 video-wrap 内部） ===== -->
        <div id="tagModal">
          <img id="tagImage" src="" alt="标签图" />

      </div>

    </div>
    <!-- /.container -->

    <!-- ===== 底部链接 ===== -->
    <div class="bottom-link-row">
      <div class="feedback-box">小镇手册</div>
      <span class="divider-line">|</span>
      <a class="footer-link" href="放链接">如何入住无风镇</a>
    </div>

    <script>
      (function () {
        const maskWrap = document.getElementById("maskWrap");
        const openBtn = document.getElementById("openBtn");
        const nextBtn = document.getElementById("nextPageBtn");
        const acceptBtn = document.getElementById("acceptBtn");
        const maskMain = document.getElementById("videoMask");

        openBtn.addEventListener("click", function () {
          maskWrap.classList.remove("show-page2");
          maskWrap.classList.add("show-page1");
        });

        nextBtn.addEventListener("click", function () {
          maskWrap.classList.remove("show-page1");
          maskWrap.classList.add("show-page2");
        });

        // =========================================================
        // 🧩 19. 新增：后续流程控制逻辑
        // =========================================================

        // 获取各个步骤元素
        const step1 = document.getElementById("step1");
        const step2 = document.getElementById("step2");
        const step3 = document.getElementById("step3");
        const step4 = document.getElementById("step4");
        const step5 = document.getElementById("step5");
        const step6 = document.getElementById("step6");
        const step7 = document.getElementById("step7");
        const allSteps = [step1, step2, step3, step4, step5, step6, step7];

        // 获取视频元素
        const videoA = document.getElementById("videoA");
        const videoB = document.getElementById("videoB");

        // 获取各个按钮
        const btnB = document.getElementById("btnB");
        const btnC = document.getElementById("btnC");
        const btnD = document.getElementById("btnD");
        const btnE = document.getElementById("btnE");
        const btnF = document.getElementById("btnF");
        const btnG = document.getElementById("btnG");
        const backToC = document.getElementById("backToC");
        const backToD1 = document.getElementById("backToD1");
        const backToD2 = document.getElementById("backToD2");
        const backToD3 = document.getElementById("backToD3");

        // 模态框
        const modal = document.getElementById("tagModal");
        const tagImage = document.getElementById("tagImage");

        // 辅助函数：切换到指定步骤
        function goToStep(stepId) {
          allSteps.forEach((el) => el.classList.remove("active"));
          if (stepId) {
            const target = document.getElementById(stepId);
            if (target) target.classList.add("active");
          }
        }

        // 关闭弹窗后开始流程
        acceptBtn.addEventListener("click", function () {
          maskMain.classList.add("mask-hide");
          // 隐藏占位图（避免遮挡）
          document.querySelector(".video-placeholder").style.display = "none";
          // 进入步骤1（视频A）
          goToStep("step1");
          videoA.play();
          // 视频A结束显示按钮B
          videoA.onended = function () {
            btnB.style.display = "block";
          };
        });

        // 按钮B：切换到视频B
        btnB.addEventListener("click", function () {
          goToStep("step2");
          videoB.play();
          videoB.onended = function () {
            btnC.style.display = "block";
          };
        });

        // 按钮C：切换到图片C
        btnC.addEventListener("click", function () {
          goToStep("step3");
        });

        // 按钮D：切换到图片D
        btnD.addEventListener("click", function () {
          goToStep("step4");
        });

        // 返回按钮：从图片D回到图片C
        backToC.addEventListener("click", function () {
          goToStep("step3");
        });

        // 按钮E：切换到图片E
        btnE.addEventListener("click", function () {
          goToStep("step5");
        });

        // 按钮F：切换到图片F
        btnF.addEventListener("click", function () {
          goToStep("step6");
        });

        // 按钮G：切换到图片G
        btnG.addEventListener("click", function () {
          goToStep("step7");
        });

        // 各图片内的返回按钮（回到图片D）
        [backToD1, backToD2, backToD3].forEach((btn) => {
          btn.addEventListener("click", function () {
            goToStep("step4");
          });
        });

        // ===== 标签按钮：弹出图片注释（在 video-wrap 内部显示） =====
        // 模拟标签图片映射（可替换为真实图片链接）
        const tagMap = {
          tag1: "https://picsum.photos/seed/tag1/400/300",
          tag2: "https://picsum.photos/seed/tag2/400/300",
          tag3: "https://picsum.photos/seed/tag3/400/300",
          tag4: "https://picsum.photos/seed/tag4/400/300",
          tag5: "https://picsum.photos/seed/tag5/400/300",
          tag6: "https://picsum.photos/seed/tag6/400/300",
          tag7: "https://picsum.photos/seed/tag7/400/300",
          tag8: "https://picsum.photos/seed/tag8/400/300",
          tag9: "https://picsum.photos/seed/tag9/400/300",
          tag10: "https://picsum.photos/seed/tag10/400/300",
          tag11: "https://picsum.photos/seed/tag11/400/300",
          tag12: "https://picsum.photos/seed/tag12/400/300",
          tag13: "https://picsum.photos/seed/tag13/400/300",
          tag14: "https://picsum.photos/seed/tag14/400/300",
        };

        // 为所有标签按钮绑定点击事件
        document.querySelectorAll(".tag-btn").forEach((btn) => {
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            const key = this.dataset.tag;
            if (tagMap[key]) {
              tagImage.src = tagMap[key];
              modal.classList.add("active");
            }
          });
        });

        // 点击模态框背景关闭
        modal.addEventListener("click", function (e) {
          if (e.target === this) {
            this.classList.remove("active");
          }
        });

        // 初始状态：所有步骤隐藏，弹窗显示
        // 原有代码已保证弹窗显示，无需额外操作
      })();
    </script>
  </body>
