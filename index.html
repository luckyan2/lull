<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小镇</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #d0cabe; /* 两侧露出的背景色 */
        min-height: 100vh;
        padding: 15px 0; /* 只保留上下内边距，左右无留白 */
      }
      /* 外层大容器：固定手机宽度375px，居中 */
      .container {
        width: 375px; /* 固定手机尺寸，不会随屏幕放大 */
        min-height: 90vh;
        background-color: #efece3;
        border: 1px solid #000000;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        border-radius: 0px;
        margin: 0 auto; /* 水平居中 */
      }
      /* 顶部导航栏：左侧头像 + 右侧设置 */
      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: static;
      }
      /* 设置按钮样式 */
      .setting-box {
        background: #e6decb;
        border: 1px solid #00000000;
        padding: 3px 10px;
        font-size: 18px;
        white-space: nowrap;
        border-radius: 0px;
        color: #000000;
        cursor: pointer;
      }
      /* 圆形头像 */
      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #ececec;
        border: 1px solid #000000;
        position: static;
        transform: none;
        object-fit: cover;
      }
      /* 下方视频区域 */
      .video-area {
        flex: 1;
        background: #ffffff;
        border: 1px solid #000000;
        width: 100%;
        overflow: hidden;
        border-radius: 5px;
      }
      .video-placeholder {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      /* 底部统一行容器：居中，放意见箱 | 网址 */
      .bottom-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px; /* 分隔符左右空隙 */
        padding: 12px 0 4px 0;
      }
      /* 意见箱：取消背景和边框，纯文字 */
      .feedback-box {
        font-size: 12px;
        color: #000;
        cursor: pointer;
      }
      /* 分隔竖线 */
      .divider {
        font-size: 12px;
        color: #000;
      }
      /* 网址文字 */
      .footer-link {
        font-size: 12px;
        color: #7d776b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 顶部栏：左边头像，右边设置 -->
      <div class="top-bar">
        <img
          class="avatar"
          src="https://preview.qiantucdn.com/freepik/512/4534/4534033.png!w1024_new_small_1"
          alt="头像"
        />
        <div class="setting-box">设置</div>
      </div>
      <!-- 视频区域 -->
      <div class="video-area">
        <img
          class="video-placeholder"
          src="https://ts3.tc.mm.bing.net/th/id/OIP-C.V7VQxOtgNNOXzYkx-XhxNgHaJF?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
          alt="视频占位图"
        />
      </div>
    </div>
    <!-- 合并为同一居中行：意见箱 | 网址 -->
    <div class="bottom-row">
      <div class="feedback-box">意见箱</div>
      <span class="divider">|</span>
      <a class="footer-link" href="放链接">菜谱</a>
    </div>
  </body>
</html>
