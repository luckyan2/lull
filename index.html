<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <title>小镇</title>
    <style>
      /* =========================================================
               🏠 1. 全局重置 & 基础样式
               ========================================================= */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #d0cabe;
        min-height: 100vh;
        padding: 15px 0;
        font-family: system-ui, sans-serif;
      }
      /* 内容最大宽度包装器 */
      .wrap-width {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
      }

      /* =========================================================
               📌 2. 顶部栏：留言 & 设置
               ========================================================= */
      .top-bar-msg-set {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: clamp(13px, 1.8vw, 16px);
        color: #000;
        margin-bottom: 15px;
      }
      .msg-left {
        cursor: pointer;
      } /* 左侧“给我留言”文字 */
      .set-right {
        cursor: pointer;
      } /* 右侧“设置”文字 */

      /* =========================================================
               📍 3. 地址文字
               ========================================================= */
      .text-address {
        text-align: center;
        font-size: clamp(11px, 1.5vw, 13px);
        color: #000;
        margin-bottom: 2px;
        white-space: nowrap;
      }

      /* =========================================================
               🏷️ 4. 主标题 & 宽度打字动画
               ========================================================= */
      .town-title {
        text-align: center;
        font-size: clamp(28px, 6vw, 80px);
        font-weight: 700;
        margin-bottom: 4px;
        color: #000;
        white-space: nowrap;
        overflow: hidden;
        animation: widthTyping 2.5s steps(12, end) forwards;
        width: 0;
        margin-left: auto;
        margin-right: auto;
      }
      /* 标题从左到右展开的动画 */
      @keyframes widthTyping {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      /* =========================================================
               👤 5. 用户头像 & 名称
               ========================================================= */
      .user-line {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: clamp(6px, 1vw, 10px);
        margin-bottom: 24px;
      }
      .avatar {
        /* 头像图片 */
        width: clamp(20px, 4vw, 36px);
        height: clamp(20px, 4vw, 36px);
        border-radius: 50%;
        background: #fff;
        border: 1px solid #000;
        object-fit: cover;
      }
      .username-text {
        /* 用户名文字 */
        font-size: clamp(10px, 2vw, 16px);
        color: #000;
        white-space: nowrap;
        border-bottom: 1px solid #000;
        padding-bottom: 2px;
      }

      /* =========================================================
               🖼️ 6. 主容器 & 视频遮罩层
               ========================================================= */
      .container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
        background-color: #efece3;
        border: 1px solid #000000;
        padding: clamp(12px, 3vw, 30px);
      }
      .video-wrap {
        /* 视频/图片占位容器 */
        width: 100%;
        position: relative;
        padding-top: 40%;
        overflow: hidden;
        border: 1px solid #000;
      }
      .video-placeholder {
        /* 背景占位图 */
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .video-mask {
        /* 弹窗遮罩层（半透明背景） */
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        padding: 4px;
      }
      .mask-inner {
        /* 弹窗内部白色/带背景的内容卡片 */
        width: 90%;
        height: 90%;
        background-image: url("https://i.imgs.ovh/2026/07/06/da17431044c46293bc8dc1c12f8bf1b5.png");
        background-size: cover;
        background-position: center;
        border: 1px solid #00000000;
        padding: clamp(10px, 2vw, 24px);
        color: #000;
        overflow: hidden;
        position: relative;
      }

      /* =========================================================
               📄 7. 弹窗内部三页面容器 (page0/1/2)
               ========================================================= */
      .page0,
      .page1,
      .page2 {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        padding: clamp(10px, 2vw, 24px);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      /* ---- 默认显示封面页 page0，隐藏 page1 / page2 ---- */
      .page0 {
        display: flex;
        z-index: 20;
        background-image: url("https://i.imgs.ovh/2026/07/08/5e66c2baa8c9f9f9a44d4837d418c1b3.jpg");
        background-size: cover;
        background-position: center;
        justify-content: flex-end;
        padding-bottom: clamp(20px, 5vw, 50px);
      }
      .page1 {
        /* 第一页：欢迎语 + 两个方框 */
        display: none;
        z-index: 10;
        justify-content: space-between;
        padding-top: clamp(6px, 4vw, 24px);
        padding-bottom: 4px;
      }
      .page2 {
        /* 第二页：邀请文字 + 接受按钮 */
        display: none;
        z-index: 10;
        justify-content: center;
        gap: clamp(8px, 1.5vw, 14px);
      }

      /* ---- 页面切换状态（由JS控制） ---- */
      .show-page1 .page0 {
        display: none;
      }
      .show-page1 .page1 {
        display: flex;
      }
      .show-page2 .page0 {
        display: none;
      }
      .show-page2 .page1 {
        display: none;
      }
      .show-page2 .page2 {
        display: flex;
      }

      /* =========================================================
               🎬 8. 页面0：封面图片 + “打开”按钮
               ========================================================= */
      .page0-btn {
        /* 封面上的“打开”按钮 */
        padding: clamp(1px, 0.4vw, 3px) clamp(8px, 3vw, 26px);
        border: 1px solid #000;
        background: #efece3;
        cursor: pointer;
        font-size: clamp(8px, 1.2vw, 16px);
        transition: 0.2s;
        /* 无淡入，直接显示 */
      }
      .page0-btn:hover {
        background: #d9d1be;
      }

      /* =========================================================
               💬 9. 页面1：顶部欢迎文字 (两行)
               ========================================================= */
      .top-welcome {
        width: 100%;
        text-align: center;
        margin-bottom: clamp(1px, 2vw, 3px);
      }
      .top-welcome .type-line {
        font-size: clamp(3px, 1.5vw, 13px);
        line-height: 1.6;
        margin: 0 auto;
        text-align: center;
      }

      /* =========================================================
               🖼️ 10. 页面1：双人方框 (镇长/副镇长)
               ========================================================= */
      .box-row {
        /* 两个方框的父容器 */
        width: 100%;
        display: flex;
        justify-content: center;
        gap: clamp(3px, 2vw, 9px);
        padding: 0 clamp(2px, 1vw, 10px);
        margin-bottom: clamp(0px, 2vw, 15px);
      }

      .flat-box {
        /* 方框通用样式：无淡入，用 visibility 控制延迟显示 */
        width: 49%;
        aspect-ratio: 3.5 / 1;
        border: 1px solid #00000000;
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: clamp(4px, 1vw, 1px);
        gap: 1px;
        visibility: hidden; /* 初始隐藏，由 animation 控制显示 */
        animation-fill-mode: forwards;
      }
      .box-slone {
        /* 左侧方框：镇长斯隆，延迟 6.4s 后瞬间出现 */
        background-image: url("https://i.imgs.ovh/2026/07/06/da17431044c46293bc8dc1c12f8bf1b5.png");
        align-items: flex-start;
        text-align: left;
        padding-left: clamp(10px, 2vw, 30px);
        animation: instantShow 0s linear 3.4s forwards;
      }
      .box-mike {
        /* 右侧方框：副镇长麦克，延迟 15.3s 后瞬间出现 */
        background-image: url("https://i.imgs.ovh/2026/07/06/da17431044c46293bc8dc1c12f8bf1b5.png");
        align-items: flex-start;
        text-align: left;
        padding-left: clamp(10px, 2vw, 30px);
        animation: instantShow 0s linear 14.2s forwards;
      }
      /* 瞬间出现关键帧（替代淡入） */
      @keyframes instantShow {
        from {
          visibility: hidden;
        }
        to {
          visibility: visible;
        }
      }

      /* 方框内部的文字（打字动画延迟各自独立） */
      .flat-box .type-line {
        font-size: clamp(4px, 1.7vw, 14px);
        line-height: 1.3;
      }

      /* =========================================================
               ⌨️ 11. 打字动画 (所有逐字出现文字共用)这里写错了，这里的文字大小只能操控第二页
               ========================================================= */
      .type-line {
        font-size: clamp(7px, 1.4vw, 29px);
        line-height: 1.5;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
        animation-fill-mode: forwards;
      }
      @keyframes typing {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      /* ---- 顶部欢迎文字 ---- */
      .line1 {
        animation: typing 3.5s steps(12, end) 0.5s forwards;
      } /* 第一行：欢迎来到无风镇 */
      .line4 {
        animation: typing 3.5s steps(14, end) 1.7s forwards;
      } /* 第二行：愿你在小镇... */

      /* ---- 左侧斯隆方框内文字 ---- */
      .sl1 {
        animation: typing 1.8s steps(14, end) 11.4s forwards;
      } /* 我是镇长斯隆 */
      .sl2 {
        animation: typing 1.8s steps(12, end) 12.2s forwards;
      } /* 负责维护小镇的秩序 */
      .sl3 {
        animation: typing 1.4s steps(8, end) 13.2s forwards;
      } /* 包括但不限于揪出坏蛋 */

      /* ---- 右侧麦克方框内文字 ---- */
      .mk1 {
        animation: typing 1.6s steps(12, end) 19.5s forwards;
      } /* 我是副镇长麦克 */
      .mk2 {
        animation: typing 1.8s steps(18, end) 20.4s forwards;
      } /* 负责维系居民间的友好交流 */
      .mk3 {
        animation: typing 1.4s steps(9, end) 22.2s forwards;
      } /* 包括但不限于送信 */

      /* =========================================================
               📨 12. 页面2：邀请文字
               ========================================================= */
      .invite-line {
        /* 居民 w 向你发起邀请 */
        animation: typing 4s steps(26, end) 1.2s forwards;
        text-align: center;
        margin: 0 auto;
      }
      .underline-w {
        /* 字母 w 下面的棕色下划线 */
        border-bottom: 2px solid #704828;
      }

      /* =========================================================
               🔘 13. 通用按钮 & 特定按钮 (下一页/接受邀请)
               ========================================================= */
      .btn-base {
        /* 弹窗内按钮基础样式（共用） */
        padding: clamp(1px, 0.4vw, 3px) clamp(8px, 3vw, 26px);
        border: 1px solid #000;
        background: #efece3;
        cursor: pointer;
        font-size: clamp(8px, 1.2vw, 16px);
        transition: 0.2s;
      }
      .btn-base:hover {
        background: #d9d1be;
      }

      #nextPageBtn {
        /* 页面1的“下一页”按钮：延迟 25s 后瞬间出现（无淡入） */
        align-self: center;
        margin-top: 0;
        visibility: hidden;
        animation: instantShow 0s linear 25s forwards;
        margin-bottom: clamp(1px, 2vw, 26px);
      }
      #acceptBtn {
        /* 页面2的“接受邀请”按钮：延迟 3s 后瞬间出现（无淡入） */
        visibility: hidden;
        animation: instantShow 0s linear 3.4s forwards;
      }

      /* =========================================================
               🚫 14. 关闭弹窗 (点击接受邀请后触发)
               ========================================================= */
      .mask-hide {
        display: none !important;
      }

      /* =========================================================
               🔗 15. 底部链接栏
               ========================================================= */
      .bottom-link-row {
        width: 90%;
        max-width: 1200px;
        margin: 20px auto 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        font-size: 12px;
      }
      .feedback-box {
        color: #000;
        cursor: pointer;
      } /* 小镇手册 */
      .divider-line {
        color: #000;
      } /* 分隔符 | */
      .footer-link {
        color: #7d776b;
        text-decoration: none;
      } /* 如何入住无风镇 */

      /* =========================================================
               📱 16. 移动端适配 (小屏幕微调)
               ========================================================= */
      @media (max-width: 480px) {
        .mask-inner {
          padding: 6px;
        }
        .page0,
        .page1,
        .page2 {
          padding: 6px;
        }
        .box-row {
          gap: 4px;
          padding: 0;
        }
        .flat-box {
          width: 46%;
          aspect-ratio: 3.2 / 1;
          padding: 2px 4px;
        }
        .flat-box .type-line {
          font-size: clamp(1px, 0.8vw, 8px);
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== 顶栏 ===== -->
    <div class="wrap-width top-bar-msg-set">
      <div class="msg-left">给我留言</div>
      <div class="set-right">设置</div>
    </div>

    <!-- ===== 地址 ===== -->
    <div class="wrap-width text-address">地址</div>

    <!-- ===== 标题 ===== -->
    <div class="wrap-width town-title">品尝红烧牛肉面</div>

    <!-- ===== 用户行 ===== -->
    <div class="wrap-width user-line">
      <img
        class="avatar"
        src="https://preview.qiantucdn.com/freepik/512/4534/4534033.png!w1024_new_small_1"
        alt="头像"
      />
      <span class="username-text">用户名</span>
    </div>

    <!-- ===== 主容器 ===== -->
    <div class="container">
      <div class="video-wrap">
        <!-- 背景占位图 -->
        <img
          class="video-placeholder"
          src="https://ts1.tc.mm.bing.net/th/id/R-C.7bbe89ce842e3500a1a153e9a00184ac?rik=M2Sc%2bGdKsDBAEw&riu=http%3a%2f%2ftqjimg.tianqistatic.com%2ftoutiao%2ftechan%2fimages%2f202002%2f21%2f7778a73cbdc8e5f6.jpg&ehk=HU0tmtH8MXi3Xi%2bn3cQxegKf6yFkzOoh4ZK65MsN7bk%3d&risl=&pid=ImgRaw&r=0"
          alt="视频占位图"
        />

        <!-- ===== 弹窗遮罩 ===== -->
        <div class="video-mask" id="videoMask">
          <div class="mask-inner" id="maskWrap">
            <!-- ===== PAGE 0：封面图片 + 打开按钮 ===== -->
            <div class="page0" id="page0">
              <!-- 背景图在 CSS .page0 中设置 -->
              <button class="page0-btn" id="openBtn">打开</button>
            </div>

            <!-- ===== PAGE 1：欢迎语 + 两个方框 + 下一页 ===== -->
            <div class="page1" id="page1">
              <div class="top-welcome">
                <div class="type-line line1">欢迎来到无风镇。</div>
                <div class="type-line line4">愿你在小镇上度过愉快的一天。</div>
              </div>

              <div class="box-row">
                <!-- 左侧方框：镇长斯隆 -->
                <div class="flat-box box-slone">
                  <div class="type-line sl1">我是镇长斯隆，</div>
                  <div class="type-line sl2">负责维护小镇的秩序，</div>
                  <div class="type-line sl3">包括但不限于揪出坏蛋。</div>
                </div>
                <!-- 右侧方框：副镇长麦克 -->
                <div class="flat-box box-mike">
                  <div class="type-line mk1">我是副镇长麦克，</div>
                  <div class="type-line mk2">负责维系居民间的友好交流，</div>
                  <div class="type-line mk3">包括但不限于送信。</div>
                </div>
              </div>

              <button class="btn-base" id="nextPageBtn">下一页</button>
            </div>

            <!-- ===== PAGE 2：邀请 + 接受邀请 ===== -->
            <div class="page2" id="page2">
              <div class="type-line invite-line">
                居民<span class="underline-w"> w </span
                >向你发起了“到我家坐坐”的邀请。
              </div>
              <button class="btn-base" id="acceptBtn">接受邀请</button>
            </div>
          </div>
          <!-- /.mask-inner -->
        </div>
        <!-- /.video-mask -->
      </div>
      <!-- /.video-wrap -->
    </div>
    <!-- /.container -->

    <!-- ===== 底部链接 ===== -->
    <div class="bottom-link-row">
      <div class="feedback-box">小镇手册</div>
      <span class="divider-line">|</span>
      <a class="footer-link" href="放链接">如何入住无风镇</a>
    </div>

    <script>
      (function () {
        const maskWrap = document.getElementById("maskWrap");
        const openBtn = document.getElementById("openBtn");
        const nextBtn = document.getElementById("nextPageBtn");
        const acceptBtn = document.getElementById("acceptBtn");
        const maskMain = document.getElementById("videoMask");

        // ----- 打开按钮：page0 → page1 -----
        openBtn.addEventListener("click", function () {
          maskWrap.classList.remove("show-page2");
          maskWrap.classList.add("show-page1");
        });

        // ----- 下一页：page1 → page2 -----
        nextBtn.addEventListener("click", function () {
          maskWrap.classList.remove("show-page1");
          maskWrap.classList.add("show-page2");
        });

        // ----- 接受邀请：关闭弹窗 -----
        acceptBtn.addEventListener("click", function () {
          maskMain.classList.add("mask-hide");
        });

        // 初始状态：只显示 page0
        maskWrap.classList.remove("show-page1", "show-page2");
      })();
    </script>
  </body>
</html>
