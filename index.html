<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小镇</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #d0cabe;
        min-height: 100vh;
        padding: 15px 0;
        font-family: system-ui, sans-serif;
      }
      /* 统一宽度容器，所有顶部元素和下方大容器左右对齐 */
      .wrap-width {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
      }
      /* 第一行：左上角给我留言，右上角设置 */
      .top-bar-msg-set {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: clamp(13px, 1.8vw, 16px);
        color: #000;
        margin-bottom: 15px;
      }
      .msg-left,
      .set-right {
        cursor: pointer;
      }
      /* 第二行：居中小字地址，跟随页面缩放 */
      .text-address {
        text-align: center;
        font-size: clamp(11px, 1.5vw, 13px);
        color: #000;
        margin-bottom: 2px;
        white-space: nowrap;
      }
      /* ========== 这里是小镇标题字号调整区域 + 打字动画 ========== */
      /* clamp(最小手机字号, 缩放速度vw, 最大电脑字号) */
      .town-title {
        text-align: center;
        font-size: clamp(28px, 6vw, 80px);
        font-weight: 700;
        margin-bottom: 4px;
        color: #000;
        white-space: nowrap;
        overflow: hidden;
        /* 打字动画：4个字符，总时长1.2秒，只播放一次，结束保持最后状态 */
        animation: typing 1.6s steps(7, end) forwards;
        /* 初始宽度0，动画过程慢慢撑开 */
        width: 0;
        margin-left: auto;
        margin-right: auto;
      }
      /* 打字关键帧动画 */
      @keyframes typing {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }
      /* ============================================== */
      /* 第四行：居中头像+用户名，整体字号自适应 */
      .user-line {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: clamp(6px, 1vw, 10px);
        margin-bottom: 24px;
      }
      .avatar {
        width: clamp(20px, 4vw, 36px);
        height: clamp(20px, 4vw, 36px);
        border-radius: 50%;
        background: #fff;
        border: 1px solid #000;
        object-fit: cover;
      }
      .username-text {
        font-size: clamp(10px, 2vw, 16px);
        color: #000;
        white-space: nowrap;
        /* 新增：用户名底部横线 */
        border-bottom: 1px solid #000;
        padding-bottom: 2px;
      }
      /* 米白色大容器：内边距动态变化，窗口越窄，留白越小 */
      .container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
        background-color: #efece3;
        border: 1px solid #000000;
        padding: clamp(12px, 3vw, 30px);
      }
      /* 横向10:4视频比例容器 */
      .video-wrap {
        width: 100%;
        position: relative;
        padding-top: 40%; /* 宽10 高4 → 4/10=40% */
        overflow: hidden;
        border: 1px solid #000;
      }
      .video-placeholder {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      /* 页面最底部，容器外：意见箱 | 网址 */
      .bottom-link-row {
        width: 90%;
        max-width: 1200px;
        margin: 20px auto 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        font-size: 12px;
      }
      .feedback-box {
        color: #000;
        cursor: pointer;
      }
      .divider-line {
        color: #000;
      }
      .footer-link {
        color: #7d776b;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <!-- 第一行 给我留言 + 设置 -->
    <div class="wrap-width top-bar-msg-set">
      <div class="msg-left">给我留言</div>
      <div class="set-right">设置</div>
    </div>

    <!-- 第二行 居中地址 -->
    <div class="wrap-width text-address">地址</div>

    <!-- 第三行 大标题 xx小镇（打字动画） -->
    <div class="wrap-width town-title">欢迎来吃阳春面</div>

    <!-- 第四行 头像+用户名（容器外部，头像尺寸+文字同步缩放） -->
    <div class="wrap-width user-line">
      <img
        class="avatar"
        src="https://preview.qiantucdn.com/freepik/512/4534/4534033.png!w1024_new_small_1"
        alt="头像"
      />
      <span class="username-text">用户名</span>
    </div>

    <!-- 米白色大容器，内部仅视频，padding随窗口同步缩小 -->
    <div class="container">
      <div class="video-wrap">
        <img
          class="video-placeholder"
          src="https://ts3.tc.mm.bing.net/th/id/OIP-C.V7VQxOtgNNOXzYkx-XhxNgHaJF?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
          alt="视频占位图"
        />
      </div>
    </div>

    <!-- 页面最底部 意见箱 | 网址 -->
    <div class="bottom-link-row">
      <div class="feedback-box">意见箱</div>
      <span class="divider-line">|</span>
      <a class="footer-link" href="放链接">一个网址</a>
    </div>
  </body>
</html>
