<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <title>小镇</title>
    <style>
      /* =========================================================
               🏠 1. 全局重置 & 基础样式
               ========================================================= */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #d0cabe;
        min-height: 100vh;
        padding: 15px 0;
        font-family: system-ui, sans-serif;
      }
      .wrap-width {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
      }

      /* =========================================================
               📌 2. 顶部栏：留言 & 设置
               ========================================================= */
      .top-bar-msg-set {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: clamp(13px, 1.8vw, 16px);
        color: #000;
        margin-bottom: 15px;
      }
      .msg-left {
        cursor: pointer;
      }
      .set-right {
        cursor: pointer;
      }

      /* =========================================================
               📍 3. 地址文字
               ========================================================= */
      .text-address {
        text-align: center;
        font-size: clamp(11px, 1.5vw, 13px);
        color: #000;
        margin-bottom: 2px;
        white-space: nowrap;
      }

      /* =========================================================
               🏷️ 4. 主标题 & 宽度打字动画
               ========================================================= */
      .town-title {
        text-align: center;
        font-size: clamp(28px, 6vw, 80px);
        font-weight: 700;
        margin-bottom: 4px;
        color: #000;
        white-space: nowrap;
        overflow: hidden;
        animation: widthTyping 2.5s steps(12, end) forwards;
        width: 0;
        margin-left: auto;
        margin-right: auto;
      }
      @keyframes widthTyping {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      /* =========================================================
               👤 5. 用户头像 & 名称
               ========================================================= */
      .user-line {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: clamp(6px, 1vw, 10px);
        margin-bottom: 24px;
      }
      .avatar {
        width: clamp(20px, 4vw, 36px);
        height: clamp(20px, 4vw, 36px);
        border-radius: 50%;
        background: #fff;
        border: 1px solid #000;
        object-fit: cover;
      }
      .username-text {
        font-size: clamp(10px, 2vw, 16px);
        color: #000;
        white-space: nowrap;
        border-bottom: 1px solid #000;
        padding-bottom: 2px;
      }

      /* =========================================================
               🖼️ 6. 主容器 & 视频遮罩层
               ========================================================= */
      .container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
        background-color: #efece3;
        border: 1px solid #000000;
        padding: clamp(12px, 3vw, 30px);
      }
      .video-wrap {
        width: 100%;
        position: relative;
        padding-top: 40%;
        overflow: hidden;
        border: 1px solid #000;
      }
      .video-placeholder {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .video-mask {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        padding: 4px;
      }
      .mask-inner {
        width: 90%;
        height: 90%;
        background-image: url("https://i.imgs.ovh/2026/07/06/da17431044c46293bc8dc1c12f8bf1b5.png");
        background-size: cover;
        background-position: center;
        border: 1px solid #00000000;
        padding: clamp(10px, 2vw, 24px);
        color: #000;
        overflow: hidden;
        position: relative;
      }

      /* =========================================================
               📄 7. 弹窗内部三页面容器 (page0/1/2)
               ========================================================= */
      .page0,
      .page1,
      .page2 {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        padding: clamp(10px, 2vw, 24px);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .page0 {
        display: flex;
        z-index: 20;
        background-image: url("https://i.imgs.ovh/2026/07/08/5e66c2baa8c9f9f9a44d4837d418c1b3.jpg");
        background-size: cover;
        background-position: center;
        justify-content: flex-end;
        padding-bottom: clamp(20px, 5vw, 50px);
      }
      .page1 {
        display: none;
        z-index: 10;
        justify-content: space-between;
        padding-top: clamp(6px, 4vw, 24px);
        padding-bottom: 4px;
      }
      .page2 {
        display: none;
        z-index: 10;
        justify-content: center;
        gap: clamp(8px, 1.5vw, 14px);
      }

      .show-page1 .page0 {
        display: none;
      }
      .show-page1 .page1 {
        display: flex;
      }
      .show-page2 .page0 {
        display: none;
      }
      .show-page2 .page1 {
        display: none;
      }
      .show-page2 .page2 {
        display: flex;
      }

      /* =========================================================
               🎬 8. 页面0：封面图片 + “打开”按钮
               ========================================================= */
      .page0-btn {
        padding: clamp(1px, 0.4vw, 3px) clamp(8px, 3vw, 26px);
        border: 1px solid #000;
        background: #efece3;
        cursor: pointer;
        font-size: clamp(8px, 1.2vw, 16px);
        transition: 0.2s;
      }
      .page0-btn:hover {
        background: #d9d1be;
      }

      /* =========================================================
               💬 9. 页面1：顶部欢迎文字 (两行)
               ========================================================= */
      .top-welcome {
        width: 100%;
        text-align: center;
        margin-bottom: clamp(1px, 2vw, 3px);
      }
      .top-welcome .type-line {
        font-size: clamp(3px, 1.5vw, 13px);
        line-height: 1.6;
        margin: 0 auto;
        text-align: center;
      }

      /* =========================================================
               🖼️ 10. 页面1：四张图片 (宽度按比例分配)
               ========================================================= */

      /* ---- 10-A. 父容器：控制四张图片的整体布局 ---- */
      .box-row {
        width: 90%;
        display: flex;
        justify-content: center;
        align-items: stretch;
        gap: clamp(4px, 1.2vw, 12px); /* 间隙保持不变 */
        padding: 0 clamp(2px, 1vw, 10px);
        margin-bottom: clamp(0px, 2vw, 15px);
      }

      /* ---- 10-B. 单张图片基础样式：不再设固定宽度，用 flex 比例控制 ---- */
      .flat-box {
        /* -------- 🔽 使用 flex 比例分配宽度 -------- */
        flex: 1 1 0; /* flex-grow: 1, flex-shrink: 1, flex-basis: 0 */
        /* 然后在子类中覆盖 flex-grow 来调整比例 */
        /* ----------------------------------------- */

        /* -------- 高度保持之前调整好的值 -------- */
        height: clamp(80px, 10vw, 130px);

        border: 1px solid #00000000;
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        padding: clamp(4px, 1vw, 10px);
        gap: 1px;
        visibility: hidden;
        animation-fill-mode: forwards;
        overflow: hidden;
      }

      /* ---- 10-C. 四张图片各自的 flex-grow 比例 ---- */
      /* 第一张 & 第三张：宽一些，flex-grow: 3 */
      .box-1,
      .box-3 {
        flex-grow: 3; /* 👈 调整此值可改变第一三张宽度（相对于第二四张） */
      }
      /* 第二张 & 第四张：窄一些，flex-grow: 1 */
      .box-2,
      .box-4 {
        flex-grow: 1; /* 👈 调整此值可改变第二四张宽度（相对于第一三张） */
      }

      /* ---- 10-D. 各自背景图（可替换） ---- */
      .box-1 {
        background-image: url("https://n.sinaimg.cn/sinakd20118/214/w2048h1366/20241101/8af6-f2c42e2356f4c886b889c8a0ee4a17c4.jpg");
        padding-left: clamp(10px, 2vw, 30px);
        animation: instantShow 0s linear 3.4s forwards;
      }
      .box-2 {
        background-image: url("https://pic.616pic.com/ys_bnew_img/00/64/95/G9REB94D6m.jpg");
        animation: instantShow 0s linear 3.4s forwards;
      }
      .box-3 {
        background-image: url("https://n.sinaimg.cn/sinakd20118/214/w2048h1366/20241101/8af6-f2c42e2356f4c886b889c8a0ee4a17c4.jpg");
        padding-left: clamp(10px, 2vw, 30px);
        animation: instantShow 0s linear 14.2s forwards;
      }
      .box-4 {
        background-image: url("https://pic.616pic.com/ys_bnew_img/00/64/95/G9REB94D6m.jpg");
        animation: instantShow 0s linear 14.2s forwards;
      }

      @keyframes instantShow {
        from {
          visibility: hidden;
        }
        to {
          visibility: visible;
        }
      }

      /* ---- 10-E. 方框内文字样式 ---- */
      .flat-box .type-line {
        font-size: clamp(7px, 1.4vw, 13px);
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
        animation-fill-mode: forwards;
      }

      /* =========================================================
               ⌨️ 11. 打字动画 (所有逐字出现文字)
               ========================================================= */
      .type-line {
        font-size: clamp(7px, 1.4vw, 29px);
        line-height: 1.5;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
        animation-fill-mode: forwards;
      }
      @keyframes typing {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      /* ---- 顶部欢迎文字 ---- */
      .line1 {
        animation: typing 3.5s steps(12, end) 0.5s forwards;
      }
      .line4 {
        animation: typing 3.5s steps(14, end) 1.7s forwards;
      }

      /* ---- 第一张图片：斯隆的文字 ---- */
      .sl1 {
        animation: typing 1.8s steps(14, end) 11.4s forwards;
      }
      .sl2 {
        animation: typing 1.8s steps(12, end) 12.2s forwards;
      }
      .sl3 {
        animation: typing 1.4s steps(8, end) 13.2s forwards;
      }

      /* ---- 第三张图片：麦克的文字 ---- */
      .mk1 {
        animation: typing 1.6s steps(12, end) 19.5s forwards;
      }
      .mk2 {
        animation: typing 1.8s steps(18, end) 20.4s forwards;
      }
      .mk3 {
        animation: typing 1.4s steps(9, end) 22.2s forwards;
      }

      /* =========================================================
               📨 12. 页面2：邀请文字
               ========================================================= */
      .invite-line {
        animation: typing 4s steps(26, end) 1.2s forwards;
        text-align: center;
        margin: 0 auto;
      }
      .underline-w {
        border-bottom: 2px solid #704828;
      }

      /* =========================================================
               🔘 13. 通用按钮 & 特定按钮 (下一页/接受邀请)
               ========================================================= */
      .btn-base {
        padding: clamp(1px, 0.4vw, 3px) clamp(8px, 3vw, 26px);
        border: 1px solid #000;
        background: #efece3;
        cursor: pointer;
        font-size: clamp(8px, 1.2vw, 20px);
        transition: 0.2s;
      }
      .btn-base:hover {
        background: #d9d1be;
      }

      #nextPageBtn {
        align-self: center;
        margin-top: 0;
        visibility: hidden;
        animation: instantShow 0s linear 25s forwards;
        margin-bottom: clamp(1px, 2vw, 26px);
      }
      #acceptBtn {
        visibility: hidden;
        animation: instantShow 0s linear 3.4s forwards;
      }

      /* =========================================================
               🚫 14. 关闭弹窗
               ========================================================= */
      .mask-hide {
        display: none !important;
      }

      /* =========================================================
               🔗 15. 底部链接栏
               ========================================================= */
      .bottom-link-row {
        width: 90%;
        max-width: 1200px;
        margin: 20px auto 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        font-size: 12px;
      }
      .feedback-box {
        color: #000;
        cursor: pointer;
      }
      .divider-line {
        color: #000;
      }
      .footer-link {
        color: #7d776b;
        text-decoration: none;
      }

      /* =========================================================
               📱 16. 移动端适配 (小屏幕微调)
               ========================================================= */
      @media (max-width: 480px) {
        .mask-inner {
          padding: 6px;
        }
        .page0,
        .page1,
        .page2 {
          padding: 6px;
        }

        .box-row {
          flex-wrap: nowrap;
          gap: 3px;
          padding: 0 2px;
          overflow: visible;
        }

        .flat-box {
          /* flex 比例不变，但高度降低使图片更扁 */
          height: clamp(35px, 4.5vw, 55px);
          padding: 3px 4px;
          flex-shrink: 1;
        }

        /* 确保比例在手机端同样生效 */
        .box-1,
        .box-3 {
          flex-grow: 3;
        }
        .box-2,
        .box-4 {
          flex-grow: 1;
        }

        .flat-box .type-line {
          font-size: clamp(4px, 1vw, 8px);
          line-height: 1.2;
        }
        .top-welcome .type-line {
          font-size: clamp(6px, 1.2vw, 10px);
        }
      }

      /* 平板等中等屏幕优化 */
      @media (min-width: 481px) and (max-width: 768px) {
        .flat-box {
          height: clamp(70px, 9vw, 110px);
        }
        .flat-box .type-line {
          font-size: clamp(6px, 1.2vw, 10px);
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== 顶栏 ===== -->
    <div class="wrap-width top-bar-msg-set">
      <div class="msg-left">给我留言</div>
      <div class="set-right">设置</div>
    </div>

    <!-- ===== 地址 ===== -->
    <div class="wrap-width text-address">地址</div>

    <!-- ===== 标题 ===== -->
    <div class="wrap-width town-title">品尝红烧牛肉面</div>

    <!-- ===== 用户行 ===== -->
    <div class="wrap-width user-line">
      <img
        class="avatar"
        src="https://preview.qiantucdn.com/freepik/512/4534/4534033.png!w1024_new_small_1"
        alt="头像"
      />
      <span class="username-text">用户名</span>
    </div>

    <!-- ===== 主容器 ===== -->
    <div class="container">
      <div class="video-wrap">
        <!-- 背景占位图 -->
        <img
          class="video-placeholder"
          src="https://ts1.tc.mm.bing.net/th/id/R-C.7bbe89ce842e3500a1a153e9a00184ac?rik=M2Sc%2bGdKsDBAEw&riu=http%3a%2f%2ftqjimg.tianqistatic.com%2ftoutiao%2ftechan%2fimages%2f202002%2f21%2f7778a73cbdc8e5f6.jpg&ehk=HU0tmtH8MXi3Xi%2bn3cQxegKf6yFkzOoh4ZK65MsN7bk%3d&risl=&pid=ImgRaw&r=0"
          alt="视频占位图"
        />

        <!-- ===== 弹窗遮罩 ===== -->
        <div class="video-mask" id="videoMask">
          <div class="mask-inner" id="maskWrap">
            <!-- ===== PAGE 0：封面图片 + 打开按钮 ===== -->
            <div class="page0" id="page0">
              <button class="page0-btn" id="openBtn">打开</button>
            </div>

            <!-- ===== PAGE 1：欢迎语 + 四张图片 + 下一页 ===== -->
            <div class="page1" id="page1">
              <div class="top-welcome">
                <div class="type-line line1">欢迎来到无风镇。</div>
                <div class="type-line line4">愿你在小镇上度过愉快的一天。</div>
              </div>

              <div class="box-row">
                <!-- 第一张：镇长斯隆（带文字），宽度比例为3 -->
                <div class="flat-box box-1">
                  <div class="type-line sl1">我是镇长斯隆，</div>
                  <div class="type-line sl2">负责维护小镇的秩序，</div>
                  <div class="type-line sl3">包括但不限于揪出坏蛋。</div>
                </div>

                <!-- 第二张：纯图片，宽度比例为1 -->
                <div class="flat-box box-2"></div>

                <!-- 第三张：副镇长麦克（带文字），宽度比例为3 -->
                <div class="flat-box box-3">
                  <div class="type-line mk1">我是副镇长麦克，</div>
                  <div class="type-line mk2">负责维系居民间的友好交流，</div>
                  <div class="type-line mk3">包括但不限于送信。</div>
                </div>

                <!-- 第四张：纯图片，宽度比例为1 -->
                <div class="flat-box box-4"></div>
              </div>

              <button class="btn-base" id="nextPageBtn">下一页</button>
            </div>

            <!-- ===== PAGE 2：邀请 + 接受邀请 ===== -->
            <div class="page2" id="page2">
              <div class="type-line invite-line">
                居民<span class="underline-w"> w </span
                >向你发起了“到我家坐坐”的邀请。
              </div>
              <button class="btn-base" id="acceptBtn">接受邀请</button>
            </div>
          </div>
          <!-- /.mask-inner -->
        </div>
        <!-- /.video-mask -->
      </div>
      <!-- /.video-wrap -->
    </div>
    <!-- /.container -->

    <!-- ===== 底部链接 ===== -->
    <div class="bottom-link-row">
      <div class="feedback-box">小镇手册</div>
      <span class="divider-line">|</span>
      <a class="footer-link" href="放链接">如何入住无风镇</a>
    </div>

    <script>
      (function () {
        const maskWrap = document.getElementById("maskWrap");
        const openBtn = document.getElementById("openBtn");
        const nextBtn = document.getElementById("nextPageBtn");
        const acceptBtn = document.getElementById("acceptBtn");
        const maskMain = document.getElementById("videoMask");

        openBtn.addEventListener("click", function () {
          maskWrap.classList.remove("show-page2");
          maskWrap.classList.add("show-page1");
        });

        nextBtn.addEventListener("click", function () {
          maskWrap.classList.remove("show-page1");
          maskWrap.classList.add("show-page2");
        });

        acceptBtn.addEventListener("click", function () {
          maskMain.classList.add("mask-hide");
        });

        maskWrap.classList.remove("show-page1", "show-page2");
      })();
    </script>
  </body>
</html>
